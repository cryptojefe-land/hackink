<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$HACK Virus Hunter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  user-select: none;
}

.scanlines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
  z-index: 1000;
}

.game-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.hud {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  font-family: 'VT323', monospace;
  font-size: 28px;
  text-shadow: 0 0 10px rgba(0,255,65,0.8);
}

.score {
  color: #00ff41;
}

.timer {
  color: #00cfff;
}

#gameCanvas {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  cursor: pointer;
}

.start-screen, .end-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.95);
  z-index: 200;
}

.title {
  font-family: 'VT323', monospace;
  font-size: 72px;
  color: #00ff41;
  text-shadow: 0 0 20px rgba(0,255,65,0.8);
  margin-bottom: 20px;
  letter-spacing: 4px;
}

.subtitle {
  font-size: 16px;
  color: rgba(0,255,65,0.6);
  margin-bottom: 40px;
  text-align: center;
  max-width: 500px;
  line-height: 1.6;
}

.instructions {
  background: rgba(0,255,65,0.05);
  border: 1px solid rgba(0,255,65,0.3);
  padding: 24px;
  margin-bottom: 40px;
  max-width: 400px;
}

.instructions div {
  font-size: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.virus-icon {
  width: 24px;
  height: 24px;
  background: radial-gradient(circle, #00ff41, #00aa2b);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,255,65,0.6);
  flex-shrink: 0;
}

.bomb-icon {
  width: 24px;
  height: 24px;
  background: radial-gradient(circle, #ff0040, #aa0020);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255,0,64,0.6);
  flex-shrink: 0;
}

.start-btn, .restart-btn {
  background: transparent;
  border: 2px solid #00ff41;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px;
  padding: 16px 48px;
  cursor: pointer;
  letter-spacing: 4px;
  text-transform: uppercase;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(0,255,65,0.3);
}

.start-btn:hover, .restart-btn:hover {
  background: rgba(0,255,65,0.1);
  box-shadow: 0 0 30px rgba(0,255,65,0.6);
  transform: scale(1.05);
}

.final-score {
  font-family: 'VT323', monospace;
  font-size: 64px;
  color: #00ff41;
  text-shadow: 0 0 20px rgba(0,255,65,0.8);
  margin-bottom: 20px;
}

.result-text {
  font-size: 18px;
  color: rgba(0,255,65,0.7);
  margin-bottom: 40px;
}

@media (max-width: 768px) {
  .title {
    font-size: 48px;
  }
  .hud {
    font-size: 24px;
  }
}
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="game-container">
  <div class="hud">
    <div class="score">SCORE: <span id="scoreValue">0</span></div>
    <div class="timer">TIME: <span id="timerValue">180</span>s</div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div class="start-screen" id="startScreen">
    <div class="title">VIRUS HUNTER</div>
    <div class="subtitle">Click viruses to earn $HACK. Avoid bombs or lose everything!</div>
    <div class="instructions">
      <div><div class="virus-icon"></div><span>Click viruses = +100 points</span></div>
      <div><div class="bomb-icon"></div><span>Click bomb = RESET TO 0</span></div>
      <div><div style="width: 24px; height: 24px; background: radial-gradient(circle, #00cfff, #0099cc); border-radius: 50%; box-shadow: 0 0 10px rgba(0,207,255,0.6); flex-shrink: 0;"></div><span>Click shield = +1000 points (rare!)</span></div>
      <div style="margin-top: 16px; border-top: 1px solid rgba(0,255,65,0.2); padding-top: 16px;">
        <span>⏱ 3 minutes • Collect as many points as possible!</span>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">START GAME</button>
  </div>

  <div class="end-screen" id="endScreen" style="display: none;">
    <div class="title">GAME OVER</div>
    <div class="final-score" id="finalScore">0 $HACK</div>
    <div class="result-text" id="resultText"></div>
    <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
let timeLeft = 180;
let gameActive = false;
let objects = [];
let effects = [];
let lastSpawn = 0;
let baseSpawnRate = 800; // Faster spawning
let bombChance = 0.15;
let shieldChance = 0.03; // 3% chance for shield (more rare)
let objectLifetime = 1500; // 1.5 seconds to click
let shieldLifetime = 1000; // Shields disappear faster
let lastTime = 0;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

function drawVirus(x, y, size, pulse) {
  const centerX = x + size / 2;
  const centerY = y + size / 2;
  const radius = size * 0.4 * (1 + pulse * 0.1);

  // Glow
  ctx.shadowBlur = 15 + pulse * 5;
  ctx.shadowColor = '#00ff41';

  // Main body
  ctx.fillStyle = '#00ff41';
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#00aa2b';
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius * 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Spikes with rotation
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth = 3;
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI * 2 / 8) * i + pulse * 0.3;
    const startX = centerX + Math.cos(angle) * radius;
    const startY = centerY + Math.sin(angle) * radius;
    const endX = centerX + Math.cos(angle) * (radius + 12);
    const endY = centerY + Math.sin(angle) * (radius + 12);

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.lineTo(endX, endY);
    ctx.stroke();

    ctx.fillStyle = '#00ff41';
    ctx.beginPath();
    ctx.arc(endX, endY, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
}

function drawBomb(x, y, size, pulse) {
  const centerX = x + size / 2;
  const centerY = y + size / 2 + 5;
  const radius = size * 0.45 * (1 + pulse * 0.15);

  // Glow with pulse
  ctx.shadowBlur = 15 + pulse * 10;
  ctx.shadowColor = '#ff0040';

  // Main body
  ctx.fillStyle = '#ff0040';
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#aa0020';
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius * 0.82, 0, Math.PI * 2);
  ctx.fill();

  // Fuse
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(centerX, centerY - radius);
  ctx.lineTo(centerX, centerY - radius - 17);
  ctx.stroke();

  // Animated sparks
  const sparkIntensity = Math.sin(pulse * 5) * 0.5 + 0.5;
  ctx.strokeStyle = `rgba(255, ${170 * sparkIntensity}, 0, ${0.8 + sparkIntensity * 0.2})`;
  ctx.lineWidth = 2.5;
  const sparkY = centerY - radius - 17;
  ctx.beginPath();
  ctx.moveTo(centerX, sparkY);
  ctx.lineTo(centerX - 5, sparkY - 5);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(centerX, sparkY);
  ctx.lineTo(centerX + 5, sparkY - 5);
  ctx.stroke();

  // Extra spark
  if (sparkIntensity > 0.7) {
    ctx.beginPath();
    ctx.moveTo(centerX, sparkY);
    ctx.lineTo(centerX, sparkY - 7);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

function drawShield(x, y, size, pulse) {
  const centerX = x + size / 2;
  const centerY = y + size / 2;
  const radius = size * 0.4;

  // Glow
  ctx.shadowBlur = 20 + pulse * 8;
  ctx.shadowColor = '#00cfff';

  // Shield shape
  ctx.fillStyle = '#00cfff';
  ctx.beginPath();
  ctx.moveTo(centerX, centerY - radius);
  ctx.quadraticCurveTo(centerX + radius * 0.8, centerY - radius * 0.5, centerX + radius * 0.6, centerY);
  ctx.quadraticCurveTo(centerX + radius * 0.8, centerY + radius * 0.7, centerX, centerY + radius * 1.2);
  ctx.quadraticCurveTo(centerX - radius * 0.8, centerY + radius * 0.7, centerX - radius * 0.6, centerY);
  ctx.quadraticCurveTo(centerX - radius * 0.8, centerY - radius * 0.5, centerX, centerY - radius);
  ctx.fill();

  // Inner shield
  ctx.fillStyle = '#0099cc';
  ctx.beginPath();
  ctx.moveTo(centerX, centerY - radius * 0.7);
  ctx.quadraticCurveTo(centerX + radius * 0.5, centerY - radius * 0.3, centerX + radius * 0.4, centerY);
  ctx.quadraticCurveTo(centerX + radius * 0.5, centerY + radius * 0.5, centerX, centerY + radius * 0.9);
  ctx.quadraticCurveTo(centerX - radius * 0.5, centerY + radius * 0.5, centerX - radius * 0.4, centerY);
  ctx.quadraticCurveTo(centerX - radius * 0.5, centerY - radius * 0.3, centerX, centerY - radius * 0.7);
  ctx.fill();

  // Cross in center
  ctx.strokeStyle = '#00cfff';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(centerX - radius * 0.3, centerY);
  ctx.lineTo(centerX + radius * 0.3, centerY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(centerX, centerY - radius * 0.3);
  ctx.lineTo(centerX, centerY + radius * 0.3);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function drawEffect(effect) {
  ctx.font = '32px VT323';
  ctx.fillStyle = effect.color;
  ctx.shadowBlur = 10;
  ctx.shadowColor = effect.color;
  ctx.textAlign = 'center';
  ctx.fillText(effect.text, effect.x, effect.y);
  ctx.shadowBlur = 0;
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  score = 0;
  timeLeft = 180;
  gameActive = true;
  objects = [];
  effects = [];
  lastSpawn = 0;
  baseSpawnRate = 800;
  bombChance = 0.15;
  shieldChance = 0.03;
  objectLifetime = 1500;
  shieldLifetime = 1000;
  updateScore();
  updateTimer();

  setInterval(() => {
    if (!gameActive) return;
    timeLeft--;
    updateTimer();

    // Increase difficulty every 20 seconds
    if (timeLeft % 20 === 0 && timeLeft > 0) {
      baseSpawnRate = Math.max(300, baseSpawnRate - 100); // Faster spawning
      bombChance = Math.min(0.25, bombChance + 0.02); // More bombs
      objectLifetime = Math.max(1000, objectLifetime - 100); // Less time to click
    }

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);

  lastTime = performance.now();
  gameLoop(lastTime);
}

function spawnObject(currentTime) {
  const rand = Math.random();
  let type = 'virus'; // default

  if (rand < shieldChance) {
    type = 'shield';
  } else if (rand < shieldChance + bombChance) {
    type = 'bomb';
  }

  const size = type === 'shield' ? 35 : 30; // Much smaller
  const padding = 40;
  const hudHeight = 80; // Space for HUD at top
  const x = padding + Math.random() * (canvas.width - size - padding * 2);
  const y = hudHeight + padding + Math.random() * (canvas.height - size - padding * 2 - hudHeight);

  objects.push({
    x: x,
    y: y,
    size: size,
    type: type,
    clicked: false,
    spawnTime: currentTime,
    alpha: 1,
    scale: 0,
    lifetime: type === 'shield' ? shieldLifetime : objectLifetime
  });
}

function gameLoop(currentTime) {
  if (!gameActive) return;

  const deltaTime = currentTime - lastTime;
  lastTime = currentTime;

  // Spawn objects
  if (currentTime - lastSpawn > baseSpawnRate) {
    spawnObject(currentTime);
    lastSpawn = currentTime;
  }

  // Clear canvas
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Update and draw objects
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    const age = currentTime - obj.spawnTime;

    // Spawn animation (first 200ms)
    if (age < 200) {
      obj.scale = age / 200;
    } else {
      obj.scale = 1;
    }

    // Remove if lifetime expired
    if (age > obj.lifetime) {
      if (obj.type === 'virus' && !obj.clicked) {
        score = Math.max(0, score - 100);
        updateScore();
        effects.push({
          x: obj.x + obj.size / 2,
          y: obj.y + obj.size / 2,
          text: '-100',
          color: '#ff6600',
          alpha: 1,
          createdAt: currentTime,
          vx: 0,
          vy: -30
        });
      }
      objects.splice(i, 1);
      continue;
    }

    // Fade out in last 300ms
    if (age > obj.lifetime - 300) {
      obj.alpha = 1 - ((age - (obj.lifetime - 300)) / 300);
    }

    // Pulse animation
    const pulse = Math.sin(age / 200);

    ctx.save();
    ctx.globalAlpha = obj.alpha;
    ctx.translate(obj.x + obj.size / 2, obj.y + obj.size / 2);
    ctx.scale(obj.scale, obj.scale);
    ctx.translate(-obj.x - obj.size / 2, -obj.y - obj.size / 2);

    if (obj.type === 'bomb') {
      drawBomb(obj.x, obj.y, obj.size, pulse);
    } else if (obj.type === 'shield') {
      drawShield(obj.x, obj.y, obj.size, pulse);
    } else {
      drawVirus(obj.x, obj.y, obj.size, pulse);
    }

    ctx.restore();
  }

  // Update and draw effects
  for (let i = effects.length - 1; i >= 0; i--) {
    const effect = effects[i];
    const age = currentTime - effect.createdAt;

    if (age > 1000) {
      effects.splice(i, 1);
      continue;
    }

    // Move effect
    if (effect.vx !== undefined) {
      effect.x += (effect.vx * deltaTime) / 1000;
      effect.y += (effect.vy * deltaTime) / 1000;
    } else {
      effect.y -= (50 * deltaTime) / 1000;
    }

    effect.alpha = 1 - (age / 1000);

    ctx.globalAlpha = effect.alpha;
    drawEffect(effect);
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(gameLoop);
}

canvas.addEventListener('click', (e) => {
  if (!gameActive) return;

  const rect = canvas.getBoundingClientRect();
  const clickX = e.clientX - rect.left;
  const clickY = e.clientY - rect.top;

  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    const centerX = obj.x + obj.size / 2;
    const centerY = obj.y + obj.size / 2;
    const distance = Math.sqrt((clickX - centerX) ** 2 + (clickY - centerY) ** 2);

    // Larger hit area - 1.5x the visual size
    if (distance <= (obj.size / 2) * obj.scale * 1.5) {

      // Explosion effect with particles
      const particleCount = obj.type === 'shield' ? 8 : 6;
      for (let j = 0; j < particleCount; j++) {
        const angle = (Math.PI * 2 / particleCount) * j;
        let emoji = '✓';
        let color = '#00ff41';

        if (obj.type === 'bomb') {
          emoji = '💥';
          color = '#ff0040';
        } else if (obj.type === 'shield') {
          emoji = '✨';
          color = '#00cfff';
        }

        effects.push({
          x: centerX + Math.cos(angle) * 15,
          y: centerY + Math.sin(angle) * 15,
          text: emoji,
          color: color,
          alpha: 1,
          createdAt: performance.now(),
          vx: Math.cos(angle) * 40,
          vy: Math.sin(angle) * 40
        });
      }

      if (obj.type === 'bomb') {
        score = 0;
        updateScore();
        effects.push({
          x: centerX,
          y: centerY - 20,
          text: 'RESET!',
          color: '#ff0040',
          alpha: 1,
          createdAt: performance.now(),
          vx: 0,
          vy: -30
        });
      } else if (obj.type === 'shield') {
        score += 1000;
        updateScore();
        effects.push({
          x: centerX,
          y: centerY - 20,
          text: '+1000',
          color: '#00cfff',
          alpha: 1,
          createdAt: performance.now(),
          vx: 0,
          vy: -30
        });
      } else {
        score += 100;
        updateScore();
        effects.push({
          x: centerX,
          y: centerY - 20,
          text: '+100',
          color: '#00ff41',
          alpha: 1,
          createdAt: performance.now(),
          vx: 0,
          vy: -30
        });
      }

      obj.clicked = true;
      objects.splice(i, 1);
      break;
    }
  }
});

function updateScore() {
  document.getElementById('scoreValue').textContent = score;
}

function updateTimer() {
  document.getElementById('timerValue').textContent = timeLeft;
}

function endGame() {
  gameActive = false;

  document.getElementById('finalScore').textContent = score + ' $HACK';

  let resultText = '';
  if (score >= 1000) {
    resultText = 'LEGENDARY HACKER! 🔥';
  } else if (score >= 500) {
    resultText = 'Elite Performance! 💎';
  } else if (score >= 200) {
    resultText = 'Good Job! ⚡';
  } else {
    resultText = 'Keep Practicing! 💪';
  }
  document.getElementById('resultText').textContent = resultText;

  document.getElementById('endScreen').style.display = 'flex';
}

function restartGame() {
  document.getElementById('endScreen').style.display = 'none';
  startGame();
}
</script>

</body>
</html>
