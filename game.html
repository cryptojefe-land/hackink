<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$HACK Virus Hunter</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  user-select: none;
}

.scanlines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
  pointer-events: none;
  z-index: 1000;
}

.game-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}

.hud {
  position: absolute;
  top: 20px;
  left: 20px;
  right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  font-family: 'VT323', monospace;
  font-size: 28px;
  text-shadow: 0 0 10px rgba(0,255,65,0.8);
}

.score {
  color: #00ff41;
}

.timer {
  color: #00cfff;
}

.game-area {
  position: absolute;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
}

.virus, .bomb {
  position: absolute;
  width: 60px;
  height: 60px;
  cursor: pointer;
  transition: transform 0.1s;
  animation: fall linear;
  will-change: top;
  backface-visibility: hidden;
  -webkit-font-smoothing: subpixel-antialiased;
}

.virus:hover, .bomb:hover {
  transform: scale(1.1);
}

.virus {
  width: 60px;
  height: 60px;
  position: relative;
  filter: drop-shadow(0 0 10px rgba(0,255,65,0.6));
}

.virus::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="25" fill="%2300ff41"/><circle cx="50" cy="50" r="20" fill="%2300aa2b"/><circle cx="45" cy="45" r="3" fill="%2300ff41"/><circle cx="55" cy="48" r="2" fill="%2300ff41"/><circle cx="48" cy="55" r="2.5" fill="%2300ff41"/><line x1="50" y1="25" x2="50" y2="10" stroke="%2300ff41" stroke-width="3"/><circle cx="50" cy="8" r="4" fill="%2300ff41"/><line x1="50" y1="75" x2="50" y2="90" stroke="%2300ff41" stroke-width="3"/><circle cx="50" cy="92" r="4" fill="%2300ff41"/><line x1="25" y1="50" x2="10" y2="50" stroke="%2300ff41" stroke-width="3"/><circle cx="8" cy="50" r="4" fill="%2300ff41"/><line x1="75" y1="50" x2="90" y2="50" stroke="%2300ff41" stroke-width="3"/><circle cx="92" cy="50" r="4" fill="%2300ff41"/><line x1="32" y1="32" x2="20" y2="20" stroke="%2300ff41" stroke-width="2.5"/><circle cx="18" cy="18" r="3.5" fill="%2300ff41"/><line x1="68" y1="32" x2="80" y2="20" stroke="%2300ff41" stroke-width="2.5"/><circle cx="82" cy="18" r="3.5" fill="%2300ff41"/><line x1="32" y1="68" x2="20" y2="80" stroke="%2300ff41" stroke-width="2.5"/><circle cx="18" cy="82" r="3.5" fill="%2300ff41"/><line x1="68" y1="68" x2="80" y2="80" stroke="%2300ff41" stroke-width="2.5"/><circle cx="82" cy="82" r="3.5" fill="%2300ff41"/></svg>') center/contain no-repeat;
}

.bomb {
  width: 60px;
  height: 60px;
  position: relative;
  filter: drop-shadow(0 0 10px rgba(255,0,64,0.6));
}

.bomb::before {
  content: '';
  position: absolute;
  width: 100%;
  height: 100%;
  background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="55" r="28" fill="%23ff0040"/><circle cx="50" cy="55" r="23" fill="%23aa0020"/><ellipse cx="45" cy="50" rx="8" ry="10" fill="%23ff0040" opacity="0.4"/><line x1="50" y1="27" x2="50" y2="10" stroke="%23666" stroke-width="4" stroke-linecap="round"/><line x1="50" y1="10" x2="45" y2="5" stroke="%23ff6600" stroke-width="3" stroke-linecap="round"/><line x1="50" y1="10" x2="55" y2="5" stroke="%23ff6600" stroke-width="3" stroke-linecap="round"/><line x1="50" y1="10" x2="50" y2="3" stroke="%23ffaa00" stroke-width="2.5" stroke-linecap="round"/><circle cx="45" cy="5" r="2" fill="%23ffaa00"/><circle cx="55" cy="5" r="2" fill="%23ffaa00"/><circle cx="50" cy="3" r="2" fill="%23ffdd00"/></svg>') center/contain no-repeat;
}

@keyframes fall {
  from {
    top: -80px;
    transform: translateZ(0);
  }
  to {
    top: calc(100vh + 20px);
    transform: translateZ(0);
  }
}

.start-screen, .end-screen {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.95);
  z-index: 200;
}

.title {
  font-family: 'VT323', monospace;
  font-size: 72px;
  color: #00ff41;
  text-shadow: 0 0 20px rgba(0,255,65,0.8);
  margin-bottom: 20px;
  letter-spacing: 4px;
}

.subtitle {
  font-size: 16px;
  color: rgba(0,255,65,0.6);
  margin-bottom: 40px;
  text-align: center;
  max-width: 500px;
  line-height: 1.6;
}

.instructions {
  background: rgba(0,255,65,0.05);
  border: 1px solid rgba(0,255,65,0.3);
  padding: 24px;
  margin-bottom: 40px;
  max-width: 400px;
}

.instructions div {
  font-size: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.virus-icon {
  width: 24px;
  height: 24px;
  background: radial-gradient(circle, #00ff41, #00aa2b);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(0,255,65,0.6);
  flex-shrink: 0;
}

.bomb-icon {
  width: 24px;
  height: 24px;
  background: radial-gradient(circle, #ff0040, #aa0020);
  border-radius: 50%;
  box-shadow: 0 0 10px rgba(255,0,64,0.6);
  flex-shrink: 0;
}

.start-btn, .restart-btn {
  background: transparent;
  border: 2px solid #00ff41;
  color: #00ff41;
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px;
  padding: 16px 48px;
  cursor: pointer;
  letter-spacing: 4px;
  text-transform: uppercase;
  transition: all 0.3s;
  box-shadow: 0 0 20px rgba(0,255,65,0.3);
}

.start-btn:hover, .restart-btn:hover {
  background: rgba(0,255,65,0.1);
  box-shadow: 0 0 30px rgba(0,255,65,0.6);
  transform: scale(1.05);
}

.final-score {
  font-family: 'VT323', monospace;
  font-size: 64px;
  color: #00ff41;
  text-shadow: 0 0 20px rgba(0,255,65,0.8);
  margin-bottom: 20px;
}

.result-text {
  font-size: 18px;
  color: rgba(0,255,65,0.7);
  margin-bottom: 40px;
}

.click-effect {
  position: absolute;
  pointer-events: none;
  font-family: 'VT323', monospace;
  font-size: 32px;
  font-weight: bold;
  animation: floatUp 1s ease-out forwards;
}

@keyframes floatUp {
  from {
    opacity: 1;
    transform: translateY(0);
  }
  to {
    opacity: 0;
    transform: translateY(-50px);
  }
}

@media (max-width: 768px) {
  .title {
    font-size: 48px;
  }
  .hud {
    font-size: 24px;
  }
  .virus, .bomb {
    width: 50px;
    height: 50px;
  }
}
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="game-container">
  <div class="hud">
    <div class="score">SCORE: <span id="scoreValue">0</span></div>
    <div class="timer">TIME: <span id="timerValue">180</span>s</div>
  </div>

  <div class="game-area" id="gameArea"></div>

  <div class="start-screen" id="startScreen">
    <div class="title">VIRUS HUNTER</div>
    <div class="subtitle">Click viruses to earn $HACK. Avoid bombs or lose everything!</div>
    <div class="instructions">
      <div><div class="virus-icon"></div><span>Click viruses = +10 $HACK</span></div>
      <div><div class="bomb-icon"></div><span>Click bomb = RESET TO 0</span></div>
      <div style="margin-top: 16px; border-top: 1px solid rgba(0,255,65,0.2); padding-top: 16px;">
        <span>⏱ 3 minutes • Speed increases over time</span>
      </div>
    </div>
    <button class="start-btn" onclick="startGame()">START GAME</button>
  </div>

  <div class="end-screen" id="endScreen" style="display: none;">
    <div class="title">GAME OVER</div>
    <div class="final-score" id="finalScore">0 $HACK</div>
    <div class="result-text" id="resultText"></div>
    <button class="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>
</div>

<script>
let score = 0;
let timeLeft = 180; // 3 minutes
let gameActive = false;
let spawnInterval;
let timerInterval;
let baseSpawnRate = 1000; // Start: 1 virus per second
let bombChance = 0.15; // 15% chance for bomb

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  score = 0;
  timeLeft = 180;
  gameActive = true;
  updateScore();
  updateTimer();

  // Start timer
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();

    // Increase difficulty over time
    if (timeLeft % 30 === 0 && timeLeft > 0) {
      baseSpawnRate = Math.max(300, baseSpawnRate - 100); // Faster spawning
      bombChance = Math.min(0.3, bombChance + 0.03); // More bombs
      restartSpawning();
    }

    if (timeLeft <= 0) {
      endGame();
    }
  }, 1000);

  // Start spawning
  startSpawning();
}

function startSpawning() {
  spawnInterval = setInterval(() => {
    if (gameActive) {
      spawnObject();
    }
  }, baseSpawnRate);
}

function restartSpawning() {
  clearInterval(spawnInterval);
  startSpawning();
}

function spawnObject() {
  const isBomb = Math.random() < bombChance;
  const obj = document.createElement('div');
  obj.className = isBomb ? 'bomb' : 'virus';

  // Random horizontal position
  const maxX = window.innerWidth - 60;
  obj.style.left = Math.random() * maxX + 'px';

  // Random fall duration based on difficulty
  const fallDuration = Math.max(2, 5 - (180 - timeLeft) / 60);
  obj.style.animationDuration = fallDuration + 's';

  obj.onclick = () => {
    if (!gameActive) return;

    if (isBomb) {
      // Bomb clicked - reset score
      score = 0;
      updateScore();
      showClickEffect(obj, 'RESET!', '#ff0040');
    } else {
      // Virus clicked - add points
      score += 10;
      updateScore();
      showClickEffect(obj, '+10', '#00ff41');
    }

    obj.remove();
  };

  // Auto-remove when animation ends
  obj.addEventListener('animationend', () => {
    // If virus reached bottom without being clicked - penalty
    if (!isBomb && gameActive) {
      score = Math.max(0, score - 10);
      updateScore();
      showClickEffect(obj, '-10', '#ff6600');
    }
    obj.remove();
  });

  document.getElementById('gameArea').appendChild(obj);
}

function showClickEffect(element, text, color) {
  const effect = document.createElement('div');
  effect.className = 'click-effect';
  effect.textContent = text;
  effect.style.color = color;
  effect.style.textShadow = `0 0 10px ${color}`;
  effect.style.left = element.style.left;
  effect.style.top = element.offsetTop + 'px';

  document.getElementById('gameArea').appendChild(effect);

  setTimeout(() => {
    effect.remove();
  }, 1000);
}

function updateScore() {
  document.getElementById('scoreValue').textContent = score;
}

function updateTimer() {
  document.getElementById('timerValue').textContent = timeLeft;
}

function endGame() {
  gameActive = false;
  clearInterval(timerInterval);
  clearInterval(spawnInterval);

  // Clear all objects
  document.getElementById('gameArea').innerHTML = '';

  // Show end screen
  document.getElementById('finalScore').textContent = score + ' $HACK';

  let resultText = '';
  if (score >= 1000) {
    resultText = 'LEGENDARY HACKER! 🔥';
  } else if (score >= 500) {
    resultText = 'Elite Performance! 💎';
  } else if (score >= 200) {
    resultText = 'Good Job! ⚡';
  } else {
    resultText = 'Keep Practicing! 💪';
  }
  document.getElementById('resultText').textContent = resultText;

  document.getElementById('endScreen').style.display = 'flex';
}

function restartGame() {
  document.getElementById('endScreen').style.display = 'none';
  baseSpawnRate = 1000;
  bombChance = 0.15;
  startGame();
}
</script>

</body>
</html>
