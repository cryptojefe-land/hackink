<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>$HACK — Run</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#00ff41;font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden}
  .scanlines{position:fixed;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:100}
  .grid-bg{position:fixed;top:0;left:0;width:100%;height:100%;background-image:linear-gradient(rgba(0,255,65,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:10;max-width:860px;margin:0 auto;padding:0 20px 60px;overflow-x:hidden}

  /* NAV */
  nav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid rgba(0,255,65,0.2);margin-bottom:28px;gap:12px}
  .nav-logo{font-family:'VT323',monospace;font-size:26px;color:#00ff41;text-decoration:none;text-shadow:0 0 15px rgba(0,255,65,0.5);letter-spacing:3px}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-link{font-size:10px;color:rgba(0,255,65,0.5);letter-spacing:2px;text-transform:uppercase;text-decoration:none;white-space:nowrap}
  .nav-link:hover{color:#00ff41}
  .dot{width:6px;height:6px;border-radius:50%;background:#00ff41;animation:blink 1.2s infinite;flex-shrink:0;box-shadow:0 0 6px rgba(0,255,65,0.8)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
  .connect-btn{background:transparent;border:1px solid rgba(0,255,65,0.4);color:rgba(0,255,65,0.7);font-family:'Share Tech Mono',monospace;font-size:10px;padding:7px 14px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;transition:all .2s;white-space:nowrap}
  .connect-btn:hover{border-color:#00ff41;color:#00ff41;box-shadow:0 0 12px rgba(0,255,65,0.2)}
  .connect-btn.connected{border-color:rgba(0,255,65,0.3);color:rgba(0,255,65,0.5)}

  /* STATS */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-bottom:10px;border:1px solid rgba(0,255,65,0.15)}
  .st{padding:8px 6px;border-right:1px solid rgba(0,255,65,0.15);text-align:center;background:rgba(0,255,65,0.02)}
  .st:last-child{border-right:none}
  .st-label{font-size:9px;color:rgba(0,255,65,0.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
  .st-val{font-family:'VT323',monospace;font-size:clamp(20px,4vw,28px);line-height:1}
  .green{color:#00ff41;text-shadow:0 0 10px rgba(0,255,65,0.6)}
  .gold{color:#f7c948;text-shadow:0 0 10px rgba(247,201,72,0.6)}
  .cyan{color:#00cfff;text-shadow:0 0 10px rgba(0,207,255,0.6)}

  /* CANVAS */
  .game-wrap{border:1px solid rgba(0,255,65,0.3);background:#000;position:relative;margin-bottom:10px;box-shadow:0 0 20px rgba(0,255,65,0.06);line-height:0;overflow:hidden;width:100%}
  canvas{display:block;width:100%;height:auto}

  /* OVERLAY */
  .overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.65);z-index:10;gap:16px;padding:20px}
  .overlay.hidden{display:none}
  .ov-title{font-family:'VT323',monospace;font-size:clamp(28px,8vw,56px);color:#00ff41;text-shadow:0 0 20px rgba(0,255,65,0.8);letter-spacing:4px}
  .ov-sub{font-size:clamp(9px,2.5vw,12px);color:rgba(0,255,65,0.5);letter-spacing:2px;text-align:center;padding:0 16px}
  .ov-btn{background:transparent;border:1px solid #00ff41;color:#00ff41;font-family:'VT323',monospace;font-size:clamp(16px,5vw,22px);letter-spacing:3px;padding:10px 28px;cursor:pointer;transition:all .2s}
  .ov-btn:hover{background:rgba(0,255,65,0.1);box-shadow:0 0 16px rgba(0,255,65,0.3)}
  .ov-btn.red{border-color:#ff0040;color:#ff0040}
  .ov-btn.red:hover{background:rgba(255,0,64,0.1);box-shadow:0 0 16px rgba(255,0,64,0.3)}

  /* HINT */
  .hint{font-size:9px;color:rgba(0,255,65,0.2);letter-spacing:1px;text-align:center;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* CLAIM */
  .claim-box{border:1px solid rgba(0,255,65,0.2);background:rgba(0,255,65,0.02);padding:12px 16px;margin-bottom:14px;box-shadow:0 0 15px rgba(0,255,65,0.04)}
  .claim-header{font-size:9px;color:rgba(0,255,65,0.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
  .claim-row{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:12px;flex-wrap:wrap}
  .claim-amount{font-family:'VT323',monospace;font-size:clamp(22px,5vw,32px);color:#f7c948;text-shadow:0 0 12px rgba(247,201,72,0.5);line-height:1}
  .claim-amount span{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(247,201,72,0.5);margin-left:4px}
  .claim-note{font-size:10px;color:rgba(0,255,65,0.3);line-height:1.6;flex:1;min-width:140px}
  .claim-btn{background:transparent;border:1px solid #f7c948;color:#f7c948;font-family:'VT323',monospace;font-size:clamp(13px,3vw,18px);letter-spacing:2px;padding:10px 16px;cursor:pointer;transition:all .3s;white-space:nowrap}
  .claim-btn:hover:not(:disabled){background:rgba(247,201,72,0.08);box-shadow:0 0 16px rgba(247,201,72,0.2)}
  .claim-btn:disabled{opacity:.3;cursor:not-allowed}
  .claim-log{font-size:11px;color:rgba(0,255,65,0.5);line-height:1.8;min-height:16px}
  .claim-log .ok{color:#00ff41}
  .claim-log .err{color:#ff0040}
  .claim-log .info{color:#00cfff}
  .claim-log .warn{color:#f7c948}

  /* LEADERBOARD */
  .lb-title{font-size:9px;color:rgba(0,255,65,0.4);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
  .lb{border:1px solid rgba(0,255,65,0.1);margin-bottom:40px}
  .lb-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid rgba(0,255,65,0.06);gap:10px;font-size:11px}
  .lb-row:last-child{border-bottom:none}
  .lb-row.top1{background:rgba(247,201,72,0.04)}
  .lb-row.top2{background:rgba(0,207,255,0.03)}
  .lb-row.top3{background:rgba(180,80,255,0.03)}
  .lb-pos{width:20px;font-family:'VT323',monospace;font-size:16px;flex-shrink:0}
  .lb-row.top1 .lb-pos{color:#f7c948}
  .lb-row.top2 .lb-pos{color:#00cfff}
  .lb-row.top3 .lb-pos{color:#c47aff}
  .lb-addr{flex:1;color:rgba(0,255,65,0.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lb-score{font-family:'VT323',monospace;font-size:18px;color:#00ff41;flex-shrink:0}
  .lb-tokens{font-family:'VT323',monospace;font-size:14px;color:#f7c948;flex-shrink:0;min-width:60px;text-align:right}

  footer{border-top:1px solid rgba(0,255,65,0.1);padding-top:20px;display:flex;justify-content:space-between;align-items:center;font-size:10px;color:rgba(0,255,65,0.2);letter-spacing:2px;flex-wrap:wrap;gap:8px}
  .fclock{font-family:'VT323',monospace;font-size:15px;color:rgba(0,255,65,0.3)}
</style>
</head>
<body>
<div class="scanlines"></div>
<div class="grid-bg"></div>
<div class="wrap">

  <nav>
    <a class="nav-logo" href="index.html">$HACK</a>
    <div class="nav-right">
      <a class="nav-link" href="index.html">← BACK</a>
      <div class="dot"></div>
      <button class="connect-btn" id="connectBtn" onclick="connectWallet()">[ CONNECT ]</button>
    </div>
  </nav>

  <!-- STATS -->
  <div class="stats">
    <div class="st"><div class="st-label">Score</div><div class="st-val green" id="scoreDisp">0</div></div>
    <div class="st"><div class="st-label">$HACK Earned</div><div class="st-val gold" id="tokensDisp">0</div></div>
    <div class="st"><div class="st-label">Best</div><div class="st-val cyan" id="bestDisp">0</div></div>
  </div>

  <!-- GAME -->
  <div class="game-wrap" id="gameWrap" onclick="handleInput()" ontouchstart="handleInput()">
    <canvas id="gc"></canvas>
    <div class="overlay" id="overlay">
      <div class="ov-sub">jump over obstacles &nbsp;·&nbsp; each jump = +1 $HACK</div>
      <button class="ov-btn" onclick="startGame(event)" style="margin-top:24px;font-size:clamp(13px,3vw,18px);padding:8px 22px;letter-spacing:2px">[ START ]</button>
    </div>
  </div>

  <div class="hint">SPACE / CLICK / TAP — JUMP &nbsp;·&nbsp; DOUBLE JUMP SUPPORTED</div>

  <!-- CLAIM -->
  <div class="claim-box">
    <div class="claim-header">&gt; earned tokens</div>
    <div class="claim-row">
      <div>
        <div class="claim-amount" id="claimAmt">0<span>$HACK</span></div>
        <div class="claim-note">tokens accumulate each session<br>connect wallet to claim</div>
      </div>
      <button class="claim-btn" id="claimBtn" onclick="claimTokens()" disabled>[ CLAIM ]</button>
    </div>
    <div class="claim-log" id="claimLog"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="lb-title">&gt; session leaderboard — top 10</div>
  <div class="lb" id="lb"></div>

  <footer>
    <div>$HACK // hackink.xyz</div>
    <div class="fclock" id="clock">SYS_TIME: 00:00:00</div>
  </footer>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const GAME_ADDRESS    = "REPLACE_WITH_DEPLOYED_GAME_ADDRESS";
const INK_CHAIN = {
  chainId:"0xDEF1",chainName:"Ink",
  nativeCurrency:{name:"Ether",symbol:"ETH",decimals:18},
  rpcUrls:["https://rpc-gel.inkonchain.com"],
  blockExplorerUrls:["https://explorer.inkonchain.com"]
};
const GAME_ABI = [
  "function claim(uint256 amount,uint256 score,bytes32 nonce,bytes calldata signature) external payable",
  "function remainingPool() external view returns (uint256)",
  "function gameActive() external view returns (bool)",
  "function claimFeeWei() external view returns (uint256)"
];

let provider, signer, walletAddress, gameContract;

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────────
const C   = document.getElementById('gc');
const ctx = C.getContext('2d');
const CW  = 800, CH = 280;
C.width = CW; C.height = CH;

const GND    = CH - 54;
const G      = '#00ff41';
const RED    = '#ff0040';
const GOLD   = '#f7c948';
const CYAN   = '#00cfff';

// ─── GAME STATE ───────────────────────────────────────────────────────────────
let state    = 'idle';
let score    = 0;
let tokens   = 0;
let best     = parseInt(localStorage.getItem('hr_best') || '0');
let allTime  = parseInt(localStorage.getItem('hr_tokens') || '0');
let frame    = 0;
let speed    = 5;
let jumpCnt  = 0;
let raf;

const P = { x:70, y:GND, w:28, h:38, vy:0, grounded:true };
const JUMP_V  = -13;
const GRAVITY = 0.65;

let obstacles = [];
let floaties  = [];
let particles = [];
let nextObs   = 90;

document.getElementById('bestDisp').textContent = best;

// ─── INPUT ────────────────────────────────────────────────────────────────────
function handleInput() { if (state==='running') doJump(); }
document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); handleInput(); }
});

function doJump() {
  if (jumpCnt >= 2) return;
  P.vy = JUMP_V; P.grounded = false; jumpCnt++;
  tokens++; allTime++;
  localStorage.setItem('hr_tokens', allTime);
  floaties.push({ x: P.x+P.w/2, y: P.y-4, life: 35, vy: -1.2 });
  // direct DOM update for speed
  document.getElementById('tokensDisp').textContent = tokens;
  document.getElementById('claimAmt').innerHTML = allTime + '<span>$HACK</span>';
  document.getElementById('claimBtn').disabled = allTime===0 || !signer;
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function startGame(e) {
  if (e) e.stopPropagation();
  state='running'; score=0; tokens=0; frame=0; speed=5;
  jumpCnt=0; obstacles=[]; floaties=[]; particles=[]; nextObs=90;
  P.y=GND; P.vy=0; P.grounded=true;
  document.getElementById('overlay').classList.add('hidden');
  if (raf) cancelAnimationFrame(raf);
  loop();
}

function loop() {
  if (state!=='running') return;
  raf = requestAnimationFrame(loop);
  frame++; score++;
  speed = 5 + score/500;

  // Physics
  P.vy += GRAVITY; P.y += P.vy;
  if (P.y >= GND) { P.y=GND; P.vy=0; P.grounded=true; jumpCnt=0; }

  // Spawn
  if (--nextObs <= 0) {
    const h = 16 + Math.random()*28;
    obstacles.push({ x:CW+10, w:16, h, y:GND+P.h-h });
    nextObs = 55 + Math.random()*70;
  }
  obstacles = obstacles.filter(o=>o.x+o.w>0);
  obstacles.forEach(o=>o.x-=speed);

  // Collision
  for (const o of obstacles) {
    if (P.x+P.w-5>o.x && P.x+5<o.x+o.w && P.y+P.h>o.y+4) { gameOver(); return; }
  }

  // FX
  floaties = floaties.filter(f=>f.life>0);
  floaties.forEach(f=>{f.y+=f.vy;f.life--;});
  particles = particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;});

  draw();
  document.getElementById('scoreDisp').textContent = score;
}

function gameOver() {
  state = 'dead';
  for(let i=0;i<10;i++) particles.push({
    x:P.x+P.w/2, y:P.y+P.h/2,
    vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6,
    life:30, color:RED
  });
  if (score>best) { best=score; localStorage.setItem('hr_best',best); }
  updateUI();
  updateLB();
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="ov-sub" style="color:rgba(255,0,64,0.6);font-size:11px">score: ${score} &nbsp;·&nbsp; +${tokens} $HACK earned</div>
    <button class="ov-btn red" onclick="startGame(event)" style="margin-top:20px;font-size:clamp(13px,3vw,18px);padding:8px 22px;letter-spacing:2px">[ RETRY ]</button>`;
  ov.classList.remove('hidden');
}

// ─── DRAW ─────────────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0,0,CW,CH);

  // Grid
  ctx.strokeStyle='rgba(0,255,65,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}

  // Ground
  ctx.strokeStyle='rgba(0,255,65,0.35)'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,GND+P.h);ctx.lineTo(CW,GND+P.h);ctx.stroke();

  // Player
  const px=P.x, py=P.y;
  ctx.shadowColor=G; ctx.shadowBlur=8;
  ctx.fillStyle=G;
  ctx.fillRect(px+7,py+10,14,20);  // body
  ctx.fillRect(px+8,py+1,12,10);   // head
  ctx.fillStyle='#000';
  ctx.fillRect(px+10,py+3,3,3);    // eye L
  ctx.fillRect(px+16,py+3,3,3);    // eye R
  ctx.fillStyle=G;
  const lp = Math.floor(frame/5)%2;
  ctx.fillRect(px+8,  py+30, 5, P.grounded?(lp?8:6):6);
  ctx.fillRect(px+15, py+30, 5, P.grounded?(lp?6:8):6);
  ctx.fillRect(px+3,  py+12, 5, 3);  // arm L
  ctx.fillRect(px+20, py+12, 5, 3);  // arm R
  ctx.shadowBlur=0;

  // Obstacles
  obstacles.forEach(o=>{
    ctx.shadowColor=RED; ctx.shadowBlur=6;
    ctx.fillStyle=RED;
    ctx.fillRect(o.x,o.y,o.w,o.h);
    ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+o.w/2,o.y-7);ctx.lineTo(o.x+o.w,o.y);ctx.fill();
    ctx.fillStyle='rgba(0,0,0,0.25)';
    for(let i=o.y;i<o.y+o.h;i+=4) ctx.fillRect(o.x,i,o.w,2);
    ctx.shadowBlur=0;
  });

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/30; ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  }); ctx.globalAlpha=1;

  // Floaties
  ctx.font='bold 11px Share Tech Mono';
  floaties.forEach(f=>{
    ctx.globalAlpha=f.life/35; ctx.fillStyle=GOLD;
    ctx.fillText('+1',f.x-8,f.y);
  }); ctx.globalAlpha=1;
}

// ─── IDLE DRAW ────────────────────────────────────────────────────────────────
(function idleDraw(){
  ctx.clearRect(0,0,CW,CH);
  ctx.strokeStyle='rgba(0,255,65,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<CW;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke();}
  for(let y=0;y<CH;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
  ctx.strokeStyle='rgba(0,255,65,0.35)';
  ctx.beginPath();ctx.moveTo(0,GND+P.h);ctx.lineTo(CW,GND+P.h);ctx.stroke();
  ctx.shadowColor=G; ctx.shadowBlur=8; ctx.fillStyle=G;
  ctx.fillRect(P.x+7,GND+10,14,20); ctx.fillRect(P.x+8,GND+1,12,10);
  ctx.fillStyle='#000'; ctx.fillRect(P.x+10,GND+3,3,3); ctx.fillRect(P.x+16,GND+3,3,3);
  ctx.fillStyle=G;
  ctx.fillRect(P.x+8,GND+30,5,8); ctx.fillRect(P.x+15,GND+30,5,8);
  ctx.fillRect(P.x+3,GND+12,5,3); ctx.fillRect(P.x+20,GND+12,5,3);
  ctx.shadowBlur=0;
})();

// ─── UI ───────────────────────────────────────────────────────────────────────
function updateUI() {
  document.getElementById('tokensDisp').textContent = tokens;
  document.getElementById('bestDisp').textContent   = best;
  document.getElementById('claimAmt').innerHTML     = allTime + '<span>$HACK</span>';
  document.getElementById('claimBtn').disabled      = allTime===0 || !signer;
}
updateUI();

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────
let lb = JSON.parse(localStorage.getItem('hr_lb') || '[]');

function updateLB() {
  if (!walletAddress) return;
  const short = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
  const idx = lb.findIndex(e=>e.addr===short);
  if (idx>=0) { if(score>lb[idx].score) lb[idx].score=score; lb[idx].tokens=(lb[idx].tokens||0)+tokens; }
  else lb.push({addr:short, score, tokens});
  lb.sort((a,b)=>b.score-a.score);
  lb = lb.slice(0,10);
  localStorage.setItem('hr_lb', JSON.stringify(lb));
  renderLB();
}

function renderLB() {
  const el = document.getElementById('lb');
  const cls = ['top1','top2','top3'];
  if (!lb.length) { el.innerHTML='<div style="padding:16px;font-size:11px;color:rgba(0,255,65,0.2);text-align:center">> no entries yet</div>'; return; }
  el.innerHTML = lb.map((e,i)=>`
    <div class="lb-row ${cls[i]||''}">
      <span class="lb-pos">#${i+1}</span>
      <span class="lb-addr">${e.addr||'—'}</span>
      <span class="lb-score">${e.score||0}</span>
      <span class="lb-tokens">+${e.tokens||0} $H</span>
    </div>`).join('');
}
renderLB();

// ─── WALLET ───────────────────────────────────────────────────────────────────
async function connectWallet() {
  if (!window.ethereum) { alert('MetaMask not found.'); return; }
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    const net = await provider.getNetwork();
    if (net.chainId!==BigInt(57073)) {
      try { await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:INK_CHAIN.chainId}]}); }
      catch(e) { if(e.code===4902) await window.ethereum.request({method:'wallet_addEthereumChain',params:[INK_CHAIN]}); else throw e; }
      provider = new ethers.BrowserProvider(window.ethereum);
    }
    signer = await provider.getSigner();
    walletAddress = await signer.getAddress();
    gameContract = new ethers.Contract(GAME_ADDRESS, GAME_ABI, signer);
    const s = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
    document.getElementById('connectBtn').textContent = s;
    document.getElementById('connectBtn').classList.add('connected');
    updateUI();
  } catch(e) { alert('Failed: '+(e.message||e)); }
}

// ─── CLAIM ────────────────────────────────────────────────────────────────────
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
async function typeLog(cls,text){
  const log=document.getElementById('claimLog');
  const line=document.createElement('div');
  line.className=cls; log.appendChild(line);
  for(const ch of('> '+text)){line.textContent+=ch;await delay(14);}
}

async function claimTokens() {
  if (!signer) { await connectWallet(); return; }
  if (allTime===0) return;
  document.getElementById('claimLog').innerHTML='';
  document.getElementById('claimBtn').disabled=true;
  try {
    await typeLog('info','score: '+best+' | tokens: '+allTime+' $HACK');
    await typeLog('warn','signature backend not yet deployed');
    await typeLog('info','contact @HACKtokenINK on X with your score');
    await typeLog('ok','> claim verification coming soon, anon.');
  } catch(e) {
    await typeLog('err','ERROR: '+(e.reason||e.message||'failed'));
  } finally {
    document.getElementById('claimBtn').disabled=false;
  }
}

// Clock
function tick(){
  const n=new Date();
  document.getElementById('clock').textContent='SYS_TIME: '+[n.getHours(),n.getMinutes(),n.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
}
setInterval(tick,1000); tick();
</script>
