<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(0,255,65,0.06)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="1200" height="630" fill="#000000"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Scanlines -->
  <rect width="1200" height="630" fill="url(#scan)" opacity="0.04"/>

  <!-- Glow blobs -->
  <ellipse cx="200" cy="315" rx="300" ry="200" fill="rgba(0,255,65,0.04)"/>
  <ellipse cx="1000" cy="315" rx="250" ry="180" fill="rgba(180,80,255,0.05)"/>

  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="rgba(0,255,65,0.2)" stroke-width="1"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="rgba(0,255,65,0.08)" stroke-width="1"/>

  <!-- Corner accents -->
  <path d="M20 80 L20 20 L80 20" fill="none" stroke="#00ff41" stroke-width="2"/>
  <path d="M1120 20 L1180 20 L1180 80" fill="none" stroke="#00ff41" stroke-width="2"/>
  <path d="M20 550 L20 610 L80 610" fill="none" stroke="#00ff41" stroke-width="2"/>
  <path d="M1120 610 L1180 610 L1180 550" fill="none" stroke="#00ff41" stroke-width="2"/>

  <!-- Top status bar -->
  <text x="60" y="70" font-family="monospace" font-size="14" fill="rgba(0,255,65,0.4)" letter-spacing="3">INK MAINNET // AIRDROP OPEN // NO KYC</text>

  <!-- Glitch layers for $HACK -->
  <text x="600" y="290" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="180" fill="none" stroke="rgba(255,0,64,0.3)" stroke-width="1" transform="translate(-3,2)">$HACK</text>
  <text x="600" y="290" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="180" fill="none" stroke="rgba(0,207,255,0.3)" stroke-width="1" transform="translate(3,-2)">$HACK</text>

  <!-- Main title -->
  <text x="600" y="290" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="180" fill="#00ff41"
    style="filter:drop-shadow(0 0 30px rgba(0,255,65,0.6))">$HACK</text>

  <!-- Divider line -->
  <line x1="60" y1="330" x2="1140" y2="330" stroke="rgba(0,255,65,0.15)" stroke-width="1"/>

  <!-- Stats row -->
  <!-- Stat 1 -->
  <text x="200" y="400" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,255,65,0.4)" letter-spacing="3">AIRDROP</text>
  <text x="200" y="445" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="48" fill="#00ff41">5,000</text>
  <text x="200" y="472" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,255,65,0.5)" letter-spacing="2">$HACK FREE</text>

  <line x1="400" y1="370" x2="400" y2="490" stroke="rgba(0,255,65,0.1)" stroke-width="1"/>

  <!-- Stat 2 -->
  <text x="600" y="400" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,255,65,0.4)" letter-spacing="3">BUY PRICE</text>
  <text x="600" y="445" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="48" fill="#00cfff">1 USDC</text>
  <text x="600" y="472" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,207,255,0.5)" letter-spacing="2">= 20,000 $HACK</text>

  <line x1="800" y1="370" x2="800" y2="490" stroke="rgba(0,255,65,0.1)" stroke-width="1"/>

  <!-- Stat 3 -->
  <text x="1000" y="400" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,255,65,0.4)" letter-spacing="3">CHAIN</text>
  <text x="1000" y="445" text-anchor="middle" font-family="monospace" font-weight="bold" font-size="48" fill="#c47aff">INK</text>
  <text x="1000" y="472" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(180,80,255,0.5)" letter-spacing="2">EVM / NO TAX</text>

  <!-- Bottom bar -->
  <rect x="20" y="560" width="1160" height="50" fill="rgba(0,255,65,0.03)"/>
  <text x="600" y="592" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(0,255,65,0.3)" letter-spacing="4">NOT FINANCIAL ADVICE // DO YOUR OWN RESEARCH</text>
</svg>
