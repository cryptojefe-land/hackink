<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const NFT_ADDRESS   = "0x86803d50b721E5616Ed7742c55CaC65D83B10c22";
const HACK_ADDRESS  = "0xe6e719bf4046Db0bb849231aEf37482187fd84f4";
const INK_CHAIN = {
  chainId:"0xDEF1", chainName:"Ink",
  nativeCurrency:{name:"Ether",symbol:"ETH",decimals:18},
  rpcUrls:["https://rpc-gel.inkonchain.com"],
  blockExplorerUrls:["https://explorer.inkonchain.com"]
};

const NFT_ABI = [
  "function mint() external payable",
  "function burnForReward(uint256 tokenId) external",
  "function totalSupply() external view returns (uint256)",
  "function remainingSupply() external view returns (uint256)",
  "function mintedBy(address) external view returns (uint256)",
  "function mintActive() external view returns (bool)",
  "function burnActive() external view returns (bool)",
  "function burnRewardPool() external view returns (uint256)",
  "function ownerOf(uint256) external view returns (address)",
  "function balanceOf(address) external view returns (uint256)",
  "event Transfer(address indexed from, address indexed to, uint256 indexed tokenId)"
];

let provider, signer, walletAddress, nftContract;
let selectedBurnId = null;
let userTokenIds   = [];

// ─── CONNECT ─────────────────────────────────────────────────────────────────
async function connectWallet() {
  if (!window.ethereum) { alert('MetaMask not found.'); return; }
  try {
    provider = new ethers.BrowserProvider(window.ethereum);
    await provider.send("eth_requestAccounts",[]);
    const net = await provider.getNetwork();
    if (net.chainId !== BigInt(57073)) {
      try { await window.ethereum.request({method:'wallet_switchEthereumChain',params:[{chainId:INK_CHAIN.chainId}]}); }
      catch(e) { if(e.code===4902) await window.ethereum.request({method:'wallet_addEthereumChain',params:[INK_CHAIN]}); else throw e; }
      provider = new ethers.BrowserProvider(window.ethereum);
    }
    signer      = await provider.getSigner();
    walletAddress = await signer.getAddress();
    nftContract   = new ethers.Contract(NFT_ADDRESS, NFT_ABI, signer);
    const s = walletAddress.slice(0,6)+'...'+walletAddress.slice(-4);
    document.getElementById('connBtn').textContent = s;
    document.getElementById('connBtn').classList.add('connected');
    window.ethereum.on('accountsChanged',()=>location.reload());
    window.ethereum.on('chainChanged',()=>location.reload());
    await loadStats();
    await loadUserNFTs();
  } catch(e) { alert('Failed: '+(e.message||e)); }
}

// ─── LOAD STATS ──────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    // 1. Загружаем ОБЩИЕ данные через readOnlyContract (работает БЕЗ кошелька)
    const [minted, remaining, mintActive] = await Promise.all([
      readOnlyContract.totalSupply(),
      readOnlyContract.remainingSupply(),
      readOnlyContract.mintActive()
    ]);

    // Обновляем текст на странице
    document.getElementById('sMinted').textContent    = Number(minted).toString();
    document.getElementById('sRemaining').textContent = Number(remaining).toString();

    const mintBtn = document.getElementById('mintBtn');
    let myMintsCount = 0;

    // 2. Проверяем ЛИЧНЫЕ данные только если кошелек подключен (есть walletAddress)
    if (typeof walletAddress !== 'undefined' && walletAddress) {
      myMintsCount = await readOnlyContract.mintedBy(walletAddress);
      document.getElementById('myMints').textContent = Number(myMintsCount).toString();
    } else {
      document.getElementById('myMints').textContent = "0";
    }

    // 3. Логика состояния кнопки
    if (!mintActive) {
      mintBtn.disabled = true;
      mintBtn.textContent = '[ MINT NOT ACTIVE ]';
    } else if (Number(remaining) === 0) {
      mintBtn.disabled = true;
      mintBtn.textContent = '[ SOLD OUT ]';
    } else if (walletAddress && Number(myMintsCount) >= 3) {
      // Кнопка блокируется, только если кошелек подключен И лимит превышен
      mintBtn.disabled = true;
      mintBtn.textContent = '[ ALREADY MINTED ]';
    } else {
      // Во всех остальных случаях (даже если кошелек не подключен) кнопка активна
      mintBtn.disabled = false;
      mintBtn.textContent = '[ MINT — 0.003 ETH ]';
      mintBtn.style.borderColor = '#00ff41';
    }
  } catch(e) { 
    console.error("Ошибка при загрузке статистики:", e); 
  }
}

// ─── LOAD USER NFTs ───────────────────────────────────────────────────────────
async function loadUserNFTs() {
  try {
    const bal = await nftContract.balanceOf(walletAddress);
    const burnActive = await nftContract.burnActive();
    const burnBtn = document.getElementById('burnBtn');

    if (Number(bal) === 0) {
      document.getElementById('noNFTs').style.display = 'block';
      burnBtn.disabled = true;
      burnBtn.textContent = '[ NO NFTs TO BURN ]';
      return;
    }

    // Scan for user tokens via Transfer events
    const rpc = new ethers.JsonRpcProvider("https://rpc-gel.inkonchain.com");
    const readContract = new ethers.Contract(NFT_ADDRESS, NFT_ABI, rpc);
    const filter = readContract.filters.Transfer(null, walletAddress);
    const events = await readContract.queryFilter(filter, 0, 'latest');
    userTokenIds = [];
    for (const ev of events) {
      const id = Number(ev.args.tokenId);
      try {
        const owner = await readContract.ownerOf(id);
        if (owner.toLowerCase() === walletAddress.toLowerCase()) {
          userTokenIds.push(id);
        }
      } catch(e) {}
    }

    if (userTokenIds.length === 0) {
      document.getElementById('noNFTs').style.display = 'block';
      burnBtn.disabled = true;
      burnBtn.textContent = '[ NO NFTs TO BURN ]';
      return;
    }

    document.getElementById('myNFTsWrap').style.display = 'block';
    const grid = document.getElementById('myNFTs');
    grid.innerHTML = '';
    userTokenIds.forEach(id => {
      const div = document.createElement('div');
      div.className = 'my-nft';
      div.id = 'nft-card-'+id;
      div.innerHTML = `<div class="my-nft-id">#${String(id).padStart(3,'0')}</div><div class="my-nft-label">OG GENESIS</div>`;
      div.onclick = () => selectBurn(id);
      grid.appendChild(div);
    });

    if (!burnActive) {
      burnBtn.disabled = true;
      burnBtn.textContent = '[ BURN NOT ACTIVE ]';
    } else {
      burnBtn.disabled = true;
      burnBtn.textContent = '[ SELECT NFT TO BURN ]';
    }
  } catch(e) { console.error(e); }
}

function selectBurn(id) {
  selectedBurnId = id;
  document.querySelectorAll('.my-nft').forEach(el => el.classList.remove('selected'));
  const card = document.getElementById('nft-card-'+id);
  if (card) card.classList.add('selected');
  const btn = document.getElementById('burnBtn');
  btn.disabled = false;
  btn.textContent = `[ BURN #${String(id).padStart(3,'0')} — GET 10M $HACK ]`;
}

// ─── EXECUTE BURN ────────────────────────────────────────────────────────────
async function executeBurn() {
  if (!signer || selectedBurnId === null) return;
  const confirmed = confirm(
    `Burn NFT #${selectedBurnId}?\n\nThis will DESTROY your NFT permanently.\nYou will receive 100,000,000 $HACK in return.\n\nThis cannot be undone.`
  );
  if (!confirmed) return;

  const btn = document.getElementById('burnBtn');
  btn.disabled = true;
  clearLog('burnLog');
  try {
    await typeLog('burnLog','warn','burning NFT #'+String(selectedBurnId).padStart(3,'0')+'...');
    const tx = await nftContract.burnForReward(selectedBurnId);
    await typeLog('burnLog','info','tx: '+tx.hash.slice(0,20)+'...');
    await tx.wait();
    await typeLog('burnLog','ok','NFT burned. 10,000,000 $HACK incoming.');
    await typeLog('burnLog','ok','> proof of conviction.');
    selectedBurnId = null;
    await loadStats();
    await loadUserNFTs();
  } catch(e) {
    await typeLog('burnLog','err','ERROR: '+(e.reason||e.message||'failed'));
    btn.disabled = false;
  }
}

// ─── NFT CANVAS PREVIEW ──────────────────────────────────────────────────────
function drawNFTPreview(seed) {
  const canvas = document.getElementById('nftCanvas');
  const ctx    = canvas.getContext('2d');
  const S      = 200;
  const r      = new Math.seedrandom ? Math.seedrandom(seed) : {random: ()=>Math.random()};
  const rnd    = () => Math.random();

  const palettes = [
    ['#00ff41','#00cf35'],['#f7c948','#c49820'],
    ['#00cfff','#0090bb'],['#c47aff','#8040cc'],['#ff3246','#bb1828']
  ];
  const pal = palettes[seed % palettes.length];

  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,S,S);

  // Grid
  ctx.strokeStyle = 'rgba(0,255,65,0.06)';
  for(let x=0;x<S;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,S);ctx.stroke();}
  for(let y=0;y<S;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(S,y);ctx.stroke();}

  // Glow bg
  const grad = ctx.createRadialGradient(S/2,S/2,10,S/2,S/2,80);
  grad.addColorStop(0,pal[0]+'22');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,S,S);

  // Hexagon
  const cx=S/2, cy=S/2+10, hr=70;
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=Math.PI/180*(60*i-30);
    i===0?ctx.moveTo(cx+hr*Math.cos(a),cy+hr*Math.sin(a)):ctx.lineTo(cx+hr*Math.cos(a),cy+hr*Math.sin(a));
  }
  ctx.closePath();
  ctx.fillStyle='rgba(0,8,2,0.9)';
  ctx.fill();
  ctx.strokeStyle=pal[0];
  ctx.lineWidth=2;
  ctx.stroke();

  // Eyes based on seed
  const eyeType = seed % 5;
  ctx.fillStyle = pal[0];
  if(eyeType===0){ // terminal
    ctx.fillRect(cx-38,cy-25,28,16); ctx.fillRect(cx+10,cy-25,28,16);
    ctx.fillStyle='#000'; ctx.fillRect(cx-35,cy-22,22,10); ctx.fillRect(cx+13,cy-22,22,10);
    ctx.fillStyle=pal[0]; ctx.fillRect(cx-32,cy-19,14,6); ctx.fillRect(cx+16,cy-19,14,6);
  } else if(eyeType===1){ // cyclops
    ctx.beginPath(); ctx.arc(cx,cy-18,14,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(cx,cy-18,6,0,Math.PI*2); ctx.fill();
  } else if(eyeType===2){ // visor
    ctx.fillRect(cx-40,cy-24,80,16);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    for(let xi=cx-38;xi<cx+38;xi+=10) ctx.fillRect(xi,cy-24,4,16);
  } else if(eyeType===3){ // x eyes
    ctx.strokeStyle=pal[0]; ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(cx-38,cy-28);ctx.lineTo(cx-18,cy-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-18,cy-28);ctx.lineTo(cx-38,cy-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+18,cy-28);ctx.lineTo(cx+38,cy-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+38,cy-28);ctx.lineTo(cx+18,cy-10);ctx.stroke();
  } else { // laser
    ctx.fillRect(cx-42,cy-20,84,8);
    ctx.fillStyle=pal[0]+'44';
    ctx.fillRect(cx-42,cy-26,84,20);
  }

  // Mouth
  ctx.fillStyle = pal[0];
  const mouthType = seed % 3;
  if(mouthType===0){
    ctx.font='bold 14px monospace'; ctx.fillText('> _',cx-20,cy+28);
  } else if(mouthType===1){
    for(let i=0;i<5;i++) ctx.fillRect(cx-34+i*16,cy+16,10,8);
  } else {
    ctx.beginPath(); ctx.arc(cx,cy+20,22,0,Math.PI); ctx.stroke();
  }

  // Border
  ctx.strokeStyle=pal[0]; ctx.lineWidth=2;
  ctx.strokeRect(4,4,S-8,S-8);
  // OG badge
  ctx.fillStyle='rgba(0,8,2,0.9)';
  ctx.fillRect(cx-40,S-28,80,20);
  ctx.strokeStyle=pal[0]; ctx.lineWidth=1;
  ctx.strokeRect(cx-40,S-28,80,20);
  ctx.fillStyle=pal[0]; ctx.font='bold 11px monospace';
  ctx.textAlign='center'; ctx.fillText('OG GENESIS',cx,S-14);
  ctx.textAlign='left';
}

// Load public stats on page load
async function loadPublicStats() {
  try {
    const rpc = new ethers.JsonRpcProvider("https://rpc-gel.inkonchain.com");
    const c   = new ethers.Contract(NFT_ADDRESS, [
      "function totalSupply() external view returns (uint256)",
      "function remainingSupply() external view returns (uint256)"
    ], rpc);
    const [minted, rem] = await Promise.all([c.totalSupply(), c.remainingSupply()]);
    document.getElementById('sMinted').textContent    = Number(minted).toString();
    document.getElementById('sRemaining').textContent = Number(rem).toString();
  } catch(e) {}
}

function clearLog(id) { document.getElementById(id).innerHTML=''; }
function delay(ms)    { return new Promise(r=>setTimeout(r,ms)); }
async function typeLog(logId, cls, text) {
  const log  = document.getElementById(logId);
  const line = document.createElement('div');
  line.className = cls; log.appendChild(line);
  for(const ch of('> '+text)){ line.textContent+=ch; await delay(14); }
}

}
